<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新闻浏览 | 新闻资讯平台</title>
    <style>
        /* --- 核心CSS变量 --- */
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --primary-light: #dbeafe;
            --secondary-color: #7c3aed;
            --secondary-light: #ede9fe;
            --accent-color: #0ea5e9;
            --success-color: #10b981;
            --text-color: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --border-light: #f1f5f9;
            --radius-lg: 16px;
            --radius-md: 10px;
            --radius-sm: 6px;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 8px 25px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 15px 40px rgba(0, 0, 0, 0.12);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-fast: all 0.2s ease;
        }

        /* --- 基础重置 --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            background-attachment: fixed;
            color: var(--text-color);
            line-height: 1.7;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* --- 顶部导航栏 --- */
        .top-nav {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            padding: 0 24px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-sm);
            border-bottom: 1px solid rgba(226, 232, 240, 0.6);
            position: sticky;
            top: 0;
            z-index: 100;
            transition: var(--transition);
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-icon {
            font-size: 26px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 登录按钮 */
        .login-btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: var(--transition);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(37, 99, 235, 0.3);
            background: linear-gradient(135deg, var(--primary-hover), var(--secondary-color));
        }

        .login-btn:active {
            transform: translateY(0);
        }

        /* 右上角用户信息 */
        .user-menu {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: var(--radius-md);
            transition: var(--transition-fast);
            position: relative;
            text-decoration: none;
            color: inherit;
        }

        .user-menu:hover {
            background: var(--primary-light);
        }

        .user-menu::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: var(--transition);
        }

        .user-menu:hover::after {
            width: calc(100% - 32px);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 18px;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);
            transition: var(--transition);
        }

        .user-menu:hover .user-avatar {
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(37, 99, 235, 0.3);
        }

        .username {
            font-weight: 600;
            font-size: 15px;
            color: var(--text-color);
        }

        /* --- 内容容器 --- */
        .content-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
            width: 95%;
        }

        /* 欢迎区域 */
        .welcome-section {
            text-align: center;
            margin-bottom: 60px;
            padding: 40px 0;
            position: relative;
        }

        .welcome-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.08) 0%, transparent 70%);
            z-index: -1;
        }

        .welcome-title {
            font-size: 36px;
            font-weight: 800;
            color: var(--text-color);
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--text-color) 0%, var(--primary-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-desc {
            color: var(--text-secondary);
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            padding-bottom: 16px;
        }

        .welcome-desc::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
        }

        /* --- 新闻列表样式 --- */
        .news-section-title {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-color);
            position: relative;
            padding-left: 16px;
        }

        .news-section-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
        }

        .section-icon {
            color: var(--primary-color);
            font-size: 22px;
        }

        .news-list-container {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            border: 1px solid rgba(226, 232, 240, 0.8);
            position: relative;
            transition: var(--transition);
        }

        .news-list-container:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        .news-table {
            width: 100%;
            border-collapse: collapse;
        }

        /* 表头 */
        .news-table thead {
            background: linear-gradient(90deg, var(--primary-light) 0%, var(--secondary-light) 100%);
        }

        .news-table th {
            padding: 20px 24px;
            text-align: left;
            font-weight: 700;
            color: var(--text-color);
            font-size: 15px;
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
            position: relative;
            overflow: hidden;
        }

        .news-table th::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            transform: translateX(-100%);
            transition: var(--transition);
        }

        .news-table th:hover::after {
            transform: translateX(0);
        }

        /* 单元格 */
        .news-table tr {
            transition: var(--transition-fast);
            border-bottom: 1px solid var(--border-light);
        }

        .news-table tr:last-child {
            border-bottom: none;
        }

        .news-table tr:hover {
            background: rgba(219, 234, 254, 0.3);
        }

        .news-table td {
            padding: 22px 24px;
            vertical-align: middle;
            position: relative;
        }

        /* ID列样式 */
        .news-table td:first-child {
            font-weight: 700;
            color: var(--primary-color);
            font-size: 15px;
            position: relative;
        }

        .news-table td:first-child::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 24px;
            background: var(--primary-color);
            border-radius: 2px;
            opacity: 0;
            transition: var(--transition);
        }

        .news-table tr:hover td:first-child::before {
            opacity: 1;
        }

        /* 新闻标题 */
        .news-title-link {
            font-weight: 700;
            color: var(--text-color);
            font-size: 17px;
            text-decoration: none;
            transition: var(--transition-fast);
            display: block;
            line-height: 1.5;
            position: relative;
            padding-left: 4px;
        }

        .news-title-link::before {
            content: '▶';
            position: absolute;
            left: -12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            color: var(--primary-color);
            opacity: 0;
            transition: var(--transition-fast);
        }

        .news-title-link:hover {
            color: var(--primary-color);
            padding-left: 12px;
        }

        .news-title-link:hover::before {
            opacity: 1;
            left: 0;
        }

        /* 新闻摘要 */
        .news-summary {
            color: var(--text-secondary);
            font-size: 15px;
            line-height: 1.7;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            transition: var(--transition);
        }

        .news-table tr:hover .news-summary {
            color: var(--text-color);
        }

        /* 发布时间 */
        .news-time {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
        }

        /* 新闻标签 */
        .news-tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 8px;
            vertical-align: middle;
        }

        .tech-tag {
            background: var(--primary-light);
            color: var(--primary-color);
        }

        .business-tag {
            background: #f0f9ff;
            color: var(--accent-color);
        }

        .economy-tag {
            background: #fef3c7;
            color: #d97706;
        }

        .innovation-tag {
            background: var(--secondary-light);
            color: var(--secondary-color);
        }

        /* 查看按钮 */
        .view-news-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            position: relative;
            overflow: hidden;
            text-decoration: none;
        }

        .view-news-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: var(--transition);
        }

        .view-news-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(37, 99, 235, 0.3);
        }

        .view-news-btn:hover::before {
            left: 100%;
        }

        .view-news-btn:active {
            transform: translateY(0);
        }

        /* 新闻统计信息 */
        .news-stats {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            background: white;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }

        .stat-item:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .stat-1 .stat-icon {
            background: rgba(37, 99, 235, 0.1);
            color: var(--primary-color);
        }

        .stat-2 .stat-icon {
            background: rgba(124, 58, 237, 0.1);
            color: var(--secondary-color);
        }

        .stat-3 .stat-icon {
            background: rgba(14, 165, 233, 0.1);
            color: var(--accent-color);
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-color);
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* --- 个人信息模态框样式 --- */
        /* 注意：这部分样式保留，但模态框功能需要JavaScript控制显示/隐藏 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 520px;
            box-shadow: var(--shadow-lg);
            transform: translateY(30px) scale(0.95);
            transition: var(--transition);
            border: 1px solid rgba(226, 232, 240, 0.8);
            overflow: hidden;
        }

        .modal-overlay.active .modal {
            transform: translateY(0) scale(1);
        }

        .modal-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(90deg, var(--primary-light) 0%, var(--secondary-light) 100%);
        }

        .modal-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-color);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-secondary);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-fast);
        }

        .modal-close:hover {
            background: rgba(0, 0, 0, 0.05);
            color: var(--text-color);
        }

        .modal-body {
            padding: 30px;
        }

        .profile-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
            position: relative;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 48px;
            color: white;
            margin-bottom: 24px;
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.25);
            border: 4px solid white;
            position: relative;
        }

        .profile-avatar::after {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            z-index: -1;
            opacity: 0.3;
            filter: blur(10px);
        }

        .profile-name {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        .profile-role {
            color: var(--primary-color);
            background: var(--primary-light);
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 10px;
        }

        .info-item {
            background: var(--bg-color);
            padding: 18px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-light);
            transition: var(--transition-fast);
        }

        .info-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
            border-color: var(--primary-light);
        }

        .info-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-value {
            font-weight: 700;
            color: var(--text-color);
            font-size: 16px;
        }

        .modal-footer {
            padding: 20px 30px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
        }

        .close-btn {
            padding: 12px 28px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .close-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(37, 99, 235, 0.3);
        }

        /* --- 响应式设计 --- */
        @media (max-width: 1024px) {
            .content-container {
                width: 98%;
                padding: 30px 15px;
            }
            
            .news-table td, .news-table th {
                padding: 18px 20px;
            }
            
            .info-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .top-nav {
                padding: 0 20px;
                height: 64px;
            }
            
            .welcome-title {
                font-size: 28px;
            }
            
            .welcome-desc {
                font-size: 16px;
            }
            
            .news-section-title {
                font-size: 22px;
                margin-bottom: 24px;
            }
            
            .news-table {
                display: block;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            
            .news-table td, .news-table th {
                padding: 16px 18px;
                min-width: 150px;
            }
            
            .news-table td:first-child,
            .news-table th:first-child {
                min-width: 80px;
            }
            
            .news-table td:last-child,
            .news-table th:last-child {
                min-width: 120px;
            }
            
            .view-news-btn {
                padding: 8px 16px;
                font-size: 13px;
            }
            
            .news-stats {
                flex-direction: column;
            }
            
            .stat-item {
                width: 100%;
            }
            
            .info-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
        }

        @media (max-width: 480px) {
            .username {
                display: none;
            }
            
            .user-menu {
                padding: 8px;
            }
            
            .login-btn {
                padding: 8px 16px;
                font-size: 13px;
            }
            
            .login-btn span {
                display: none;
            }
            
            .welcome-title {
                font-size: 24px;
            }
            
            .welcome-section {
                margin-bottom: 40px;
                padding: 30px 0;
            }
            
            .content-container {
                width: 100%;
                padding: 20px 12px;
            }
            
            .news-list-container {
                border-radius: var(--radius-md);
            }
            
            .modal {
                width: 95%;
            }
            
            .modal-body {
                padding: 20px;
            }
        }

        /* --- 动画效果 --- */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .welcome-section,
        .news-section-title,
        .news-list-container,
        .news-stats {
            animation: fadeIn 0.8s ease-out forwards;
        }

        .news-list-container {
            animation-delay: 0.2s;
        }

        .news-stats {
            animation-delay: 0.4s;
        }

        .news-table tr {
            animation: fadeIn 0.5s ease-out forwards;
        }

        .news-table tr:nth-child(1) { animation-delay: 0.3s; }
        .news-table tr:nth-child(2) { animation-delay: 0.4s; }
        .news-table tr:nth-child(3) { animation-delay: 0.5s; }
        .news-table tr:nth-child(4) { animation-delay: 0.6s; }

        /* --- 工具类 --- */
        .text-gradient {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .gradient-border {
            position: relative;
            border: 2px solid transparent;
            background-clip: padding-box;
        }

        .gradient-border::before {
            content: '';
            position: absolute;
            top: -2px;
            right: -2px;
            bottom: -2px;
            left: -2px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: inherit;
            z-index: -1;
        }

        .pill {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }

        .pill-primary {
            background: var(--primary-light);
            color: var(--primary-color);
        }

        .pill-secondary {
            background: var(--secondary-light);
            color: var(--secondary-color);
        }

        .pill-accent {
            background: rgba(14, 165, 233, 0.1);
            color: var(--accent-color);
        }

        /* --- 新增新闻卡片视图（可选） --- */
        .news-card-view {
            display: none;
        }

        @media (max-width: 768px) {
            .news-table-view {
                display: none;
            }
            
            .news-card-view {
                display: block;
            }
            
            .news-card {
                background: white;
                border-radius: var(--radius-md);
                padding: 20px;
                margin-bottom: 20px;
                box-shadow: var(--shadow-sm);
                border: 1px solid var(--border-light);
                transition: var(--transition);
            }
            
            .news-card:hover {
                transform: translateY(-3px);
                box-shadow: var(--shadow-md);
            }
            
            .card-header {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                margin-bottom: 12px;
            }
            
            .card-id {
                font-weight: 700;
                color: var(--primary-color);
                font-size: 14px;
            }
            
            .card-title {
                font-weight: 700;
                color: var(--text-color);
                font-size: 17px;
                margin-bottom: 10px;
                line-height: 1.4;
            }
            
            .card-summary {
                color: var(--text-secondary);
                font-size: 14px;
                line-height: 1.6;
                margin-bottom: 15px;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }
            
            .card-footer {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            
            .card-time {
                color: var(--text-muted);
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <header class="top-nav">
        <div class="logo">
            <span class="logo-icon">📰</span>
            <span>新闻资讯平台</span>
        </div>
        <div id="userSection">
            <a href="./login.html" class="login-btn" id="loginButton">
                🔐 <span>登录</span>
            </a>
            <div class="user-menu" id="userMenu" style="display: none;">
                <div class="user-avatar" id="userAvatar">U</div>
                <div class="username" id="usernameDisplay"></div>
            </div>
        </div>
    </header>

    <main class="content-container">
        <section class="welcome-section">
            <h1 class="welcome-title">欢迎浏览最新新闻资讯</h1>
            <p class="welcome-desc">实时更新，带你了解天下事</p>
        </section>
        <section style="margin-top: 40px;">
            <h2 class="news-section-title">
                <span class="section-icon">📝</span>
                最新新闻
            </h2>

            <div class="news-list-container news-table-view">
                <table class="news-table">
                    <thead>
                        <tr>
                            <th style="width: 5%;">ID</th>
                            <th style="width: 35%;">标题</th>
                            <th style="width: 45%;">摘要</th>
                            <th style="width: 10%;">发布时间</th>
                            <th style="width: 5%;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="newsTableBody">
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- 个人信息模态框 -->
    <div class="modal-overlay" id="profileModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">个人信息</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="profile-info">
                    <div class="profile-avatar" id="modalAvatar">U</div>
                    <h3 class="profile-name" id="modalUsername"></h3>
                    <div class="profile-role" id="modalRole"></div>
                </div>
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">用户名</div>
                        <div class="info-value" id="infoUsername"></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">角色</div>
                        <div class="info-value" id="infoRole"></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">登录时间</div>
                        <div class="info-value" id="infoLoginTime"></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">操作</div>
                        <div class="info-value">
                            <button class="btn-primary" onclick="logout()" style="width: 100%;">退出登录</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="close-btn" onclick="closeModal()">关闭</button>
            </div>
        </div>
    </div>
</body>
</html>
<script src="./js/jquery-4.0.0.min.js"></script>
